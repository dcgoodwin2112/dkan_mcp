services:
  dkan_mcp.logger_channel:
    parent: logger.channel_base
    arguments: ['dkan_mcp']

  dkan_mcp.server_factory:
    class: Drupal\dkan_mcp\Server\McpServerFactory
    arguments:
      - '@dkan_mcp.tools.metastore'
      - '@dkan_mcp.tools.datastore'
      - '@dkan_mcp.tools.search'
      - '@dkan_mcp.tools.harvest'
      - '@dkan_mcp.tools.service'
      - '@dkan_mcp.tools.event'
      - '@dkan_mcp.tools.permission'
      - '@dkan_mcp.tools.resource'
      - '@dkan_mcp.tools.write'
      - '@dkan_mcp.tools.drupal'
      - '@dkan_mcp.tools.status'
      - '@dkan_mcp.tools.log'

  dkan_mcp.tools.metastore:
    class: Drupal\dkan_mcp\Tools\MetastoreTools
    arguments:
      - '@dkan.metastore.service'
      - '@dkan.common.dataset_info'

  dkan_mcp.tools.datastore:
    class: Drupal\dkan_mcp\Tools\DatastoreTools
    arguments:
      - '@dkan.datastore.service'
      - '@dkan.datastore.query'
      - '@dkan.metastore.service'
      - '@dkan.common.dataset_info'
      - '@database'
      - '@dkan_mcp.logger_channel'

  dkan_mcp.tools.search:
    class: Drupal\dkan_mcp\Tools\SearchTools
    arguments:
      - '@http_client'
      - '@request_stack'

  dkan_mcp.tools.harvest:
    class: Drupal\dkan_mcp\Tools\HarvestTools
    arguments:
      - '@dkan.harvest.service'
      - '@dkan_mcp.logger_channel'

  dkan_mcp.tools.service:
    class: Drupal\dkan_mcp\Tools\ServiceTools
    arguments:
      - '@service_container'
      - '@module_handler'

  dkan_mcp.tools.event:
    class: Drupal\dkan_mcp\Tools\EventTools
    arguments:
      - '@service_container'
      - '@event_dispatcher'

  dkan_mcp.tools.resource:
    class: Drupal\dkan_mcp\Tools\ResourceTools
    arguments:
      - '@dkan.metastore.service'
      - '@dkan.metastore.resource_mapper'
      - '@dkan.datastore.service'
      - '@dkan.common.dataset_info'

  dkan_mcp.tools.permission:
    class: Drupal\dkan_mcp\Tools\PermissionTools
    arguments:
      - '@user.permissions'
      - '@router.route_provider'
      - '@entity_type.manager'
      - '@module_handler'

  dkan_mcp.tools.drupal:
    class: Drupal\dkan_mcp\Tools\DrupalTools
    arguments:
      - '@entity_type.manager'
      - '@entity_field.manager'
      - '@entity_type.bundle.info'
      - '@module_handler'
      - '@extension.list.module'
      - '@config.factory'
      - '@router.route_provider'
      - '@service_container'

  dkan_mcp.tools.status:
    class: Drupal\dkan_mcp\Tools\StatusTools
    arguments:
      - '@dkan.metastore.service'
      - '@dkan.common.dataset_info'
      - '@dkan.harvest.service'
      - '@module_handler'
      - '@extension.list.module'
      - '@queue'
      - '@plugin.manager.queue_worker'

  dkan_mcp.tools.log:
    class: Drupal\dkan_mcp\Tools\LogTools
    arguments:
      - '@database'

  dkan_mcp.tools.write:
    class: Drupal\dkan_mcp\Tools\WriteTools
    arguments:
      - '@module_installer'
      - '@module_handler'
      - '@dkan.metastore.service'
      - '@dkan.datastore.service'
      - '@dkan_mcp.logger_channel'

  dkan_mcp.controller.mcp:
    class: Drupal\dkan_mcp\Controller\McpController
    arguments:
      - '@dkan_mcp.server_factory'
      - '@dkan_mcp.logger_channel'

  dkan_mcp.cors_subscriber:
    class: Drupal\dkan_mcp\EventSubscriber\McpCorsSubscriber
    tags:
      - { name: event_subscriber }
